name: Refresh dashboard data

on:
  schedule:
    # Hourly between Monday 08:00 Thai time → Saturday 08:00 Thai time (UTC+7).
    # Window: Mon 01:00 UTC → Sat 01:00 UTC (continuous, ~120 hourly runs/week).
    #
    # GitHub Actions only supports POSIX cron (no minute ranges across days),
    # so we split the window into 3 schedules:
    - cron: "0 1-23 * * 1"     # Mon 01:00-23:00 UTC  (Mon 08:00 Thai → Tue 06:00 Thai)
    - cron: "0 * * * 2-5"      # Tue-Fri all 24 hours
    - cron: "0 0-1 * * 6"      # Sat 00:00-01:00 UTC  (Sat 07:00-08:00 Thai)
  workflow_dispatch: {}        # manual trigger button

permissions:
  contents: write              # allow the workflow to commit dataset.json back

concurrency:
  group: refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests python-dateutil yfinance pandas

      - name: Refresh dataset.json
        env:
          BIGDATA_API_KEY: ${{ secrets.BIGDATA_API_KEY }}
          # Optional: FMP_API_KEY as fallback source
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        run: python scripts/refresh_data.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain dataset.json)" ]; then
            git add dataset.json
            git commit -m "refresh: $(date -u +'%Y-%m-%d %H:%M UTC')"
            # Retry push up to 3 times with rebase, in case origin/main moved
            # while we were running (e.g. another commit landed).
            for i in 1 2 3; do
              git pull --rebase origin main && git push origin main && break
              echo "push attempt $i failed, retrying in 5s..."
              sleep 5
            done
          else
            echo "No changes to dataset.json"
          fi
