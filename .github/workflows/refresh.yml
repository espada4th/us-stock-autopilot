name: Refresh dashboard data

on:
  schedule:
    # Smart hourly window aligned with US market activity + Thai-time sleep cycle.
    # Schedule in Thailand time (UTC+7):
    #   Monday: FULL 24 hours (catches weekend news + Monday open)
    #   Tue-Fri: 15:00 (pre-market US) → next day 09:00 (covers full US session)
    #   Sat: last cycle ends at 09:00 Thai (run Fri 15:00 → Sat 09:00)
    #   Sun: dark (market closed, no news cycle worth refreshing for)
    #
    # GitHub Actions cron runs in UTC, so we convert:
    #   Mon Thai 00:00-23:59  =  Sun UTC 17:00 → Mon UTC 16:59
    #   Tue Thai 15:00 → Wed Thai 09:00  =  Tue UTC 08:00 → Wed UTC 02:00
    #   (same shape for Wed→Thu, Thu→Fri, Fri→Sat)
    #
    # POSIX cron can't span a day/week boundary in one line, so we split.
    #
    # --- Monday Thai (full 24h) ---
    - cron: "0 17-23 * * 0"    # Sun UTC 17-23  =  Mon Thai 00-06
    - cron: "0 0-16 * * 1"     # Mon UTC 00-16  =  Mon Thai 07-23
    # --- Tuesday 15:00 → Wednesday 09:00 Thai ---
    - cron: "0 8-23 * * 2"     # Tue UTC 08-23  =  Tue Thai 15 → Wed Thai 06
    - cron: "0 0-2 * * 3"      # Wed UTC 00-02  =  Wed Thai 07-09
    # --- Wednesday 15:00 → Thursday 09:00 Thai ---
    - cron: "0 8-23 * * 3"     # Wed UTC 08-23
    - cron: "0 0-2 * * 4"      # Thu UTC 00-02
    # --- Thursday 15:00 → Friday 09:00 Thai ---
    - cron: "0 8-23 * * 4"     # Thu UTC 08-23
    - cron: "0 0-2 * * 5"      # Fri UTC 00-02
    # --- Friday 15:00 → Saturday 09:00 Thai ---
    - cron: "0 8-23 * * 5"     # Fri UTC 08-23
    - cron: "0 0-2 * * 6"      # Sat UTC 00-02
    # Total: 100 runs/week (vs ~120 in the old always-on window).
  workflow_dispatch: {}        # manual trigger button

permissions:
  contents: write              # allow the workflow to commit dataset.json back

concurrency:
  group: refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10        # scanner over 1500 tickers finishes in 3-5 min typically
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # pandas+lxml+bs4 for Wikipedia scrape; yfinance for OHLC; requests everywhere
          # deep-translator: EN->TH translation for Finnhub news (free, no API key)
          pip install requests python-dateutil yfinance pandas lxml beautifulsoup4 deep-translator

      - name: Run scanner (refresh dataset.json + auto-build universe if needed)
        env:
          # Optional: if FINNHUB_API_KEY is set in repo secrets, scanner enriches
          # top-N tickers with real-time quote + news + fundamentals + insider
          # transactions. Without it the scanner still runs (yfinance-only mode).
          # Setup guide: docs/finnhub-setup.md
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          # Kept for historical fallbacks; scanner no longer requires them.
          BIGDATA_API_KEY: ${{ secrets.BIGDATA_API_KEY }}
          FMP_API_KEY:     ${{ secrets.FMP_API_KEY }}
        run: python scripts/refresh_data.py

      - name: Regenerate ticker/SYM.html pages for top-N
        run: python scripts/gen_ticker_pages.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dataset.json universe.json ticker/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "refresh: $(date -u +'%Y-%m-%d %H:%M UTC')"
            # Retry push up to 3 times with rebase, in case origin/main moved
            # while we were running (e.g. another commit landed).
            for i in 1 2 3; do
              git pull --rebase origin main && git push origin main && break
              echo "push attempt $i failed, retrying in 5s..."
              sleep 5
            done
          fi
