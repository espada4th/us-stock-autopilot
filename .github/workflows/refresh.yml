name: Refresh dashboard data

on:
  schedule:
    # Every hour on :15 during US market hours (13:15 - 21:15 UTC = 9:15am - 5:15pm ET)
    # Mon-Fri. Adjust as you like.
    - cron: "15 13-21 * * 1-5"
  workflow_dispatch: {}   # manual trigger button

permissions:
  contents: write   # allow the workflow to commit dataset.json back

concurrency:
  group: refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests python-dateutil

      - name: Refresh dataset.json
        env:
          BIGDATA_API_KEY: ${{ secrets.BIGDATA_API_KEY }}
          # Optional: FMP_API_KEY as fallback source
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        run: python scripts/refresh_data.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain dataset.json)" ]; then
            git add dataset.json
            git commit -m "refresh: $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          else
            echo "No changes to dataset.json"
          fi
