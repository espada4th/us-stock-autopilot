name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # Auto-deploy after the hourly Refresh workflow finishes.
  # (Refresh's bot-push won't trigger `on: push` because it uses GITHUB_TOKEN,
  # so we hook into workflow_run instead.)
  workflow_run:
    workflows: ["Refresh dashboard data"]
    types: [completed]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v4
        with:
          path: "."
      - id: deployment
        uses: actions/deploy-pages@v4
