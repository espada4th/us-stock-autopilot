<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="pt">Loading… · Buy-the-Dip Scanner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600;700&family=IBM+Plex+Sans+Thai:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0b0f17; --panel:#141b27; --panel-2:#1a2332; --line:#243142;
    --text:#e6edf7; --muted:#8b97ab; --sub:#6b7688;
    --green:#22d3a0; --red:#ff5a6a; --yellow:#f5c451;
    --blue:#5b9bff; --purple:#a78bfa; --orange:#ff9c5b;
    --star:#f6c453;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body {
    font-family:'Inter','IBM Plex Sans Thai',-apple-system,BlinkMacSystemFont,sans-serif;
    background:var(--bg); color:var(--text); font-size:14px; line-height:1.55; min-height:100vh;
  }
  a { color:inherit; text-decoration:none; }
  .mono { font-family:'JetBrains Mono',monospace; }
  .pos { color:var(--green); }
  .neg { color:var(--red); }
  .neu { color:var(--muted); }

  /* Header */
  header {
    position:sticky; top:0; z-index:20;
    background:rgba(11,15,23,0.92); backdrop-filter:blur(12px);
    border-bottom:1px solid var(--line); padding:12px 24px;
  }
  .header-row { display:flex; align-items:center; gap:16px; max-width:1200px; margin:0 auto; }
  .back {
    display:inline-flex; align-items:center; gap:6px; font-size:13px; color:var(--muted);
    padding:6px 10px; border-radius:6px; border:1px solid var(--line); background:var(--panel);
    transition:all 0.15s;
  }
  .back:hover { color:var(--text); border-color:#334559; }
  .crumb { color:var(--muted); font-size:12px; margin-left:auto; display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  .crumb .asof { color:var(--text); font-family:'JetBrains Mono',monospace; }
  .crumb .ago { font-size:11px; padding:2px 8px; border-radius:10px; background:var(--panel); border:1px solid var(--line); }
  .crumb .ago.fresh { color:var(--green); border-color:rgba(34,211,160,0.35); }
  .crumb .ago.stale { color:var(--yellow); border-color:rgba(245,196,81,0.35); }
  .crumb .dot { width:6px; height:6px; border-radius:50%; background:var(--green); display:inline-block; margin-right:6px; vertical-align:middle; }

  /* Price chart */
  .chart-card { background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:18px 22px; margin-bottom:22px; }
  .chart-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; flex-wrap:wrap; gap:8px; }
  .chart-head .t { font-size:13px; color:var(--muted); font-weight:700; text-transform:uppercase; letter-spacing:0.05em; display:flex; align-items:center; gap:8px; }
  .chart-head .t::before { content:''; width:3px; height:14px; background:var(--blue); border-radius:1px; }
  .chart-legend { display:flex; gap:14px; font-size:11px; color:var(--muted); }
  .chart-legend span::before { content:''; display:inline-block; width:10px; height:2px; vertical-align:middle; margin-right:5px; }
  .chart-legend .l-px::before { background:var(--blue); height:2px; }
  .chart-legend .l-sup::before { background:var(--yellow); border-top:1.5px dashed var(--yellow); height:0; }
  .chart-legend .l-res::before { background:var(--red); border-top:1.5px dashed var(--red); height:0; }
  .chart-legend .l-fv::before { background:var(--purple); border-top:1.5px dashed var(--purple); height:0; }
  .chart-legend .l-entry::before { background:rgba(34,211,160,0.35); height:8px; }
  .price-chart { width:100%; height:280px; display:block; }
  .price-chart .grid line { stroke:var(--line); stroke-width:1; }
  .price-chart .axis text { fill:var(--muted); font-size:10px; font-family:'JetBrains Mono',monospace; }
  .price-chart .area { fill:rgba(91,155,255,0.10); stroke:none; }
  .price-chart .line { fill:none; stroke:var(--blue); stroke-width:1.6; }
  .price-chart .sup-line { stroke:var(--yellow); stroke-width:1.2; stroke-dasharray:4 3; fill:none; }
  .price-chart .res-line { stroke:var(--red); stroke-width:1.2; stroke-dasharray:4 3; fill:none; }
  .price-chart .fv-line { stroke:var(--purple); stroke-width:1.2; stroke-dasharray:4 3; fill:none; }
  .price-chart .entry-band { fill:rgba(34,211,160,0.12); stroke:none; }
  .price-chart .label { fill:var(--text); font-size:10px; font-family:'JetBrains Mono',monospace; }
  .price-chart .label.sup { fill:var(--yellow); }
  .price-chart .label.res { fill:var(--red); }
  .price-chart .label.fv { fill:var(--purple); }

  .wrap { max-width:1200px; margin:0 auto; padding:24px; }

  /* Hero */
  .hero { display:grid; grid-template-columns:1fr auto; gap:24px; align-items:start; margin-bottom:24px; }
  .hero-main h1 { font-size:32px; font-weight:800; letter-spacing:-0.025em; display:flex; align-items:baseline; gap:12px; }
  .hero-main h1 .sym-logo {
    width:44px; height:44px; border-radius:10px; display:inline-flex; align-items:center; justify-content:center;
    font-size:15px; font-weight:800; color:#0b0f17;
  }
  .hero-main .name { font-size:15px; color:var(--muted); margin-top:6px; }
  .hero-main .tags { margin-top:10px; display:flex; gap:6px; flex-wrap:wrap; }
  .tag {
    padding:3px 9px; border-radius:5px; font-size:11px; font-weight:600;
    background:var(--panel); border:1px solid var(--line); color:var(--muted); text-transform:uppercase; letter-spacing:0.03em;
  }
  .tag.hi { color:var(--blue); border-color:rgba(91,155,255,0.3); background:rgba(91,155,255,0.1); }

  .hero-price { text-align:right; min-width:180px; }
  .hero-price .big { font-size:36px; font-weight:800; font-family:'JetBrains Mono',monospace; letter-spacing:-0.02em; }
  .hero-price .chg { font-size:15px; font-weight:600; margin-top:2px; }
  .hero-price .chg span { margin-right:10px; }

  /* Dip score card */
  .dip-card { background:linear-gradient(135deg, var(--panel) 0%, var(--panel-2) 100%); border:1px solid var(--line); border-radius:14px; padding:20px 22px; margin-bottom:22px; }
  .dip-row { display:flex; align-items:center; gap:20px; flex-wrap:wrap; }
  .dip-score {
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    width:100px; height:100px; border-radius:14px; flex-shrink:0;
    font-family:'JetBrains Mono',monospace;
  }
  .dip-score .n { font-size:40px; font-weight:800; letter-spacing:-0.04em; line-height:1; }
  .dip-score .l { font-size:10px; letter-spacing:0.08em; margin-top:4px; opacity:0.7; }
  .dip-score.s80 { background:rgba(34,211,160,0.18); color:var(--green); border:1px solid rgba(34,211,160,0.4); }
  .dip-score.s65 { background:rgba(91,155,255,0.18); color:var(--blue); border:1px solid rgba(91,155,255,0.4); }
  .dip-score.s50 { background:rgba(245,196,81,0.14); color:var(--yellow); border:1px solid rgba(245,196,81,0.35); }
  .dip-score.s0  { background:var(--panel-2); color:var(--muted); border:1px solid var(--line); }

  .dip-head { flex:1; min-width:240px; }
  .dip-head .h { font-size:17px; font-weight:700; color:var(--text); letter-spacing:-0.01em; margin-bottom:6px; line-height:1.4; }
  .dip-head .p { font-size:13px; color:var(--muted); line-height:1.6; }
  .dip-signals { display:flex; gap:5px; flex-wrap:wrap; margin-top:10px; }
  .sig { padding:2px 8px; border-radius:4px; font-size:10px; font-weight:700; background:var(--panel-2); color:var(--muted); text-transform:uppercase; letter-spacing:0.04em; }
  .sig.sig-pull { background:rgba(255,90,106,0.14); color:var(--red); }
  .sig.sig-rsi { background:rgba(34,211,160,0.14); color:var(--green); }
  .sig.sig-macd { background:rgba(91,155,255,0.14); color:var(--blue); }
  .sig.sig-fv { background:rgba(167,139,250,0.16); color:var(--purple); }
  .sig.sig-bb { background:rgba(255,156,91,0.14); color:var(--orange); }
  .sig.sig-sup { background:rgba(245,196,81,0.14); color:var(--yellow); }

  /* Entry zone highlight */
  .entry-card { background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:18px 22px; margin-bottom:22px; }
  .entry-head { font-size:12px; color:var(--muted); font-weight:600; text-transform:uppercase; letter-spacing:0.05em; margin-bottom:12px; display:flex; align-items:center; gap:8px; }
  .entry-head::before { content:''; width:3px; height:14px; background:var(--green); border-radius:1px; }
  .entry-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:14px; }
  .entry-box { background:var(--panel-2); border:1px solid var(--line); border-radius:10px; padding:12px 14px; }
  .entry-box .l { font-size:10px; color:var(--muted); font-weight:600; text-transform:uppercase; letter-spacing:0.04em; margin-bottom:4px; }
  .entry-box .v { font-size:18px; font-weight:700; font-family:'JetBrains Mono',monospace; letter-spacing:-0.01em; }
  .entry-box.entry .v { color:var(--green); }
  .entry-box.stop .v { color:var(--red); }
  .entry-box.t1 .v, .entry-box.t2 .v { color:var(--blue); }
  .entry-box .sub { font-size:10px; color:var(--muted); margin-top:2px; }

  /* Grid layout */
  .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:18px; margin-bottom:22px; }
  .card { background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:18px 22px; }
  .card h2 { font-size:13px; color:var(--muted); font-weight:700; text-transform:uppercase; letter-spacing:0.05em; margin-bottom:14px; display:flex; align-items:center; gap:8px; }
  .card h2::before { content:''; width:3px; height:14px; background:var(--blue); border-radius:1px; }
  .card h2.val::before { background:var(--purple); }
  .card h2.tech::before { background:var(--orange); }
  .card h2.fund::before { background:var(--green); }
  .card h2.cat::before { background:var(--yellow); }

  /* Metric list */
  .mrow { display:flex; align-items:center; justify-content:space-between; padding:8px 0; border-bottom:1px dashed var(--line); font-size:13px; }
  .mrow:last-child { border-bottom:none; }
  .mrow .k { color:var(--muted); }
  .mrow .v { font-weight:600; font-family:'JetBrains Mono',monospace; font-size:13px; }
  .mrow .v.thai { font-family:inherit; }

  /* Morningstar-style valuation */
  .val-top { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:14px; }
  .val-big { background:var(--panel-2); border:1px solid var(--line); border-radius:10px; padding:12px 14px; }
  .val-big .l { font-size:10px; color:var(--muted); text-transform:uppercase; font-weight:600; letter-spacing:0.04em; }
  .val-big .v { font-size:20px; font-weight:700; font-family:'JetBrains Mono',monospace; margin-top:3px; }
  .val-big .sub { font-size:11px; color:var(--muted); margin-top:2px; }
  .stars { color:var(--star); font-size:20px; letter-spacing:-1px; }
  .stars .off { color:var(--line); }
  .moat-wide { color:var(--green); font-weight:700; }
  .moat-narrow { color:var(--yellow); font-weight:700; }
  .moat-none { color:var(--muted); }
  .fh-strong { color:var(--green); }
  .fh-mod { color:var(--yellow); }
  .fh-weak { color:var(--red); }

  /* Range bar */
  .range {
    position:relative; height:8px; background:var(--panel-2); border:1px solid var(--line); border-radius:4px; margin:10px 0 2px;
  }
  .range .fill { position:absolute; top:0; bottom:0; left:0; background:linear-gradient(90deg, var(--green) 0%, var(--blue) 100%); border-radius:3px; }
  .range .mark { position:absolute; top:-4px; width:3px; height:16px; background:var(--text); border-radius:2px; }
  .range-labels { display:flex; justify-content:space-between; font-size:10px; color:var(--muted); margin-top:4px; font-family:'JetBrains Mono',monospace; }

  /* Thai narrative */
  .narr { background:linear-gradient(135deg, var(--panel) 0%, var(--panel-2) 100%); border:1px solid var(--line); border-radius:14px; padding:22px; margin-bottom:22px; }
  .narr h2 { font-size:13px; color:var(--muted); font-weight:700; text-transform:uppercase; letter-spacing:0.05em; margin-bottom:16px; display:flex; align-items:center; gap:8px; }
  .narr h2::before { content:''; width:3px; height:14px; background:var(--green); border-radius:1px; }
  .narr .head {
    font-family:'IBM Plex Sans Thai','Inter',sans-serif;
    font-size:20px; font-weight:600; line-height:1.5; margin-bottom:12px; color:var(--text);
    letter-spacing:-0.005em;
  }
  .narr .sum { font-family:'IBM Plex Sans Thai',sans-serif; font-size:14px; color:var(--text); line-height:1.75; margin-bottom:16px; opacity:0.9; }
  .narr h3 { font-size:11px; color:var(--muted); font-weight:700; text-transform:uppercase; letter-spacing:0.05em; margin:14px 0 8px; }
  .narr ul { list-style:none; padding:0; }
  .narr li {
    font-family:'IBM Plex Sans Thai',sans-serif; font-size:13.5px; line-height:1.7;
    padding:6px 0 6px 22px; position:relative;
  }
  .narr li::before {
    content:''; position:absolute; left:4px; top:14px; width:6px; height:6px; border-radius:50%;
  }
  .narr .why li::before { background:var(--green); }
  .narr .risks li::before { background:var(--red); }
  .narr .thesis {
    margin-top:16px; padding:12px 14px; background:rgba(34,211,160,0.08); border:1px solid rgba(34,211,160,0.25); border-radius:10px;
    font-family:'IBM Plex Sans Thai',sans-serif; font-size:14px; color:var(--green); font-weight:600;
  }
  .narr .thesis::before { content:'💡 THESIS: '; font-size:10px; color:var(--muted); letter-spacing:0.05em; margin-right:4px; font-weight:700; }

  /* Disclaimer */
  .disc { font-size:11px; color:var(--sub); text-align:center; padding:20px 0 40px; line-height:1.7; }
  .disc strong { color:var(--muted); }

  .state { padding:80px 24px; text-align:center; color:var(--muted); }
  .spinner { display:inline-block; width:22px; height:22px; border:2px solid var(--line); border-top-color:var(--blue); border-radius:50%; animation:spin 0.8s linear infinite; margin-right:10px; vertical-align:middle; }
  @keyframes spin { to { transform:rotate(360deg); } }

  /* Responsive */
  @media (max-width:900px) {
    .hero { grid-template-columns:1fr; }
    .hero-price { text-align:left; }
    .entry-grid { grid-template-columns:repeat(2,1fr); }
    .grid2 { grid-template-columns:1fr; }
    .hero-main h1 { font-size:26px; }
    .hero-price .big { font-size:30px; }
    .val-top { grid-template-columns:1fr 1fr; }
  }
</style>
</head>
<body>
<header>
  <div class="header-row">
    <a href="../index.html" class="back">← Back to scanner</a>
    <div class="crumb">
      <span><span class="dot"></span>As of <span class="asof" id="asof">—</span></span>
      <span id="ago" class="ago">—</span>
    </div>
  </div>
</header>

<div class="wrap" id="content">
  <div class="state"><span class="spinner"></span>Loading ticker data…</div>
</div>

<script>
// SYMBOL is injected by generator - replace "AAPL"
const SYMBOL = "AGYS";

function stars(n) {
  if (!n) return '<span class="stars"><span class="off">★★★★★</span></span>';
  let h = '<span class="stars">';
  for (let i=1;i<=5;i++) h += (i<=n) ? '★' : '<span class="off">★</span>';
  return h + '</span>';
}
function fmtPct(v, d=1) { if (v==null||isNaN(v)) return '—'; const s = v>0?'+':''; return s + v.toFixed(d) + '%'; }
function fmtNum(v, d=2) { if (v==null) return '—'; return v.toFixed(d); }
function fmtUSD(v, d=2) { if (v==null) return '—'; return '$' + v.toFixed(d); }
function fmtB(v) { if (v==null) return '—'; return v >= 1000 ? (v/1000).toFixed(2)+'T' : v.toFixed(1)+'B'; }
function pctCls(v) { if (v==null) return 'neu'; return v>0 ? 'pos' : v<0 ? 'neg' : 'neu'; }
function dipCls(n) { if (n>=80) return 's80'; if (n>=65) return 's65'; if (n>=50) return 's50'; return 's0'; }
function moatCls(m) { return m==='Wide' ? 'moat-wide' : m==='Narrow' ? 'moat-narrow' : 'moat-none'; }
function fhCls(h) { return h==='Strong'?'fh-strong' : h==='Moderate'?'fh-mod' : 'fh-weak'; }
function sigClass(s) {
  if (s.includes('pullback')) return 'sig-pull';
  if (s.includes('rsi')) return 'sig-rsi';
  if (s.includes('macd')) return 'sig-macd';
  if (s.includes('fair_value')||s.includes('discount')) return 'sig-fv';
  if (s.includes('bb')||s.includes('bollinger')) return 'sig-bb';
  if (s.includes('support')) return 'sig-sup';
  return '';
}
function sigLabel(s) {
  const map = {
    'pullback_>20pct':'PULL -20%','pullback_>15pct':'PULL -15%','pullback_>10pct':'PULL -10%',
    'rsi_oversold_recovery':'RSI OVERSOLD','macd_bullish_cross':'MACD BULLISH',
    'fair_value_discount_>15pct':'FV -15%','fair_value_discount_>10pct':'FV -10%',
    'near_support_level':'NEAR SUPPORT','near_bb_lower':'NEAR BB LOWER','wide_moat_4star':'WIDE MOAT',
  };
  return map[s] || s.replace(/_/g,' ').toUpperCase();
}

function relativeTime(iso) {
  if (!iso) return '';
  const t = Date.parse(iso);
  if (isNaN(t)) return '';
  const s = Math.floor((Date.now() - t) / 1000);
  if (s < 60) return 'just now';
  if (s < 3600) return Math.floor(s/60) + ' min ago';
  if (s < 86400) return Math.floor(s/3600) + ' hr ago';
  return Math.floor(s/86400) + ' day' + (Math.floor(s/86400)===1?'':'s') + ' ago';
}

function updateAgo(iso) {
  const el = document.getElementById('ago');
  if (!el || !iso) return;
  const s = Math.floor((Date.now() - Date.parse(iso)) / 1000);
  el.textContent = relativeTime(iso);
  el.className = 'ago ' + (s < 3600 ? 'fresh' : s < 86400 ? '' : 'stale');
}

function buildChart(t) {
  const hist = t.history;
  if (!hist || !hist.closes || hist.closes.length < 2) return '<div style="padding:40px; text-align:center; color:var(--muted);">No price history available</div>';
  const closes = hist.closes, dates = hist.dates || [];
  const W = 1040, H = 260, padL = 42, padR = 12, padT = 14, padB = 28;
  const innerW = W - padL - padR, innerH = H - padT - padB;

  // y-range: include closes, support, resistance, fv, entry zone
  const extras = [t.tech.support, t.tech.resistance, t.val.fair_value, t.entry.entry_low, t.entry.entry_high, t.entry.stop_loss].filter(x => x != null);
  const lo = Math.min(...closes, ...extras);
  const hi = Math.max(...closes, ...extras);
  const rng = (hi - lo) || 1;
  const pad = rng * 0.06;
  const yLo = lo - pad, yHi = hi + pad;
  const yRng = yHi - yLo;

  const x = i => padL + (i / (closes.length - 1)) * innerW;
  const y = v => padT + (1 - (v - yLo) / yRng) * innerH;

  // Build line + area path
  const linePath = 'M' + closes.map((c, i) => `${x(i).toFixed(1)},${y(c).toFixed(1)}`).join('L');
  const areaPath = linePath + `L${x(closes.length-1).toFixed(1)},${padT + innerH} L${x(0).toFixed(1)},${padT + innerH} Z`;

  // Y-axis labels (5 ticks)
  const yTicks = [];
  for (let i = 0; i <= 4; i++) {
    const v = yLo + (yRng / 4) * i;
    yTicks.push({ v, y: y(v) });
  }
  // X-axis labels (every ~30 days)
  const xTicks = [];
  const step = Math.max(1, Math.floor(closes.length / 5));
  for (let i = 0; i < closes.length; i += step) {
    xTicks.push({ i, label: dates[i] ? dates[i].slice(5) : '' });
  }
  if (xTicks[xTicks.length-1].i !== closes.length - 1) {
    xTicks.push({ i: closes.length - 1, label: dates[closes.length - 1] ? dates[closes.length - 1].slice(5) : '' });
  }

  // Entry zone band (horizontal band from entry_low to entry_high)
  const entryBand = t.entry.entry_low && t.entry.entry_high
    ? `<rect class="entry-band" x="${padL}" y="${y(t.entry.entry_high)}" width="${innerW}" height="${y(t.entry.entry_low) - y(t.entry.entry_high)}"/>`
    : '';

  // Horizontal ref lines
  const supLine = t.tech.support ? `<line class="sup-line" x1="${padL}" x2="${padL+innerW}" y1="${y(t.tech.support)}" y2="${y(t.tech.support)}"/>
    <text class="label sup" x="${padL+innerW-4}" y="${y(t.tech.support)-4}" text-anchor="end">SUP $${t.tech.support.toFixed(2)}</text>` : '';
  const resLine = t.tech.resistance ? `<line class="res-line" x1="${padL}" x2="${padL+innerW}" y1="${y(t.tech.resistance)}" y2="${y(t.tech.resistance)}"/>
    <text class="label res" x="${padL+innerW-4}" y="${y(t.tech.resistance)-4}" text-anchor="end">RES $${t.tech.resistance.toFixed(2)}</text>` : '';
  const fvLine = t.val.fair_value ? `<line class="fv-line" x1="${padL}" x2="${padL+innerW}" y1="${y(t.val.fair_value)}" y2="${y(t.val.fair_value)}"/>
    <text class="label fv" x="${padL+innerW-4}" y="${y(t.val.fair_value)-4}" text-anchor="end">FV $${t.val.fair_value.toFixed(2)}</text>` : '';

  return `
  <svg class="price-chart" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
    <g class="grid">
      ${yTicks.map(tk => `<line x1="${padL}" x2="${padL+innerW}" y1="${tk.y.toFixed(1)}" y2="${tk.y.toFixed(1)}"/>`).join('')}
    </g>
    ${entryBand}
    <path class="area" d="${areaPath}"/>
    <path class="line" d="${linePath}"/>
    ${supLine}
    ${resLine}
    ${fvLine}
    <g class="axis">
      ${yTicks.map(tk => `<text x="${padL-6}" y="${tk.y.toFixed(1)+3}" text-anchor="end">$${tk.v.toFixed(0)}</text>`).join('')}
      ${xTicks.map(tk => `<text x="${x(tk.i).toFixed(1)}" y="${H - 8}" text-anchor="middle">${tk.label}</text>`).join('')}
    </g>
  </svg>`;
}
