<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="pt">Loading… · Buy-the-Dip Scanner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600;700&family=IBM+Plex+Sans+Thai:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0b0f17; --panel:#141b27; --panel-2:#1a2332; --line:#243142;
    --text:#e6edf7; --muted:#8b97ab; --sub:#6b7688;
    --green:#22d3a0; --red:#ff5a6a; --yellow:#f5c451;
    --blue:#5b9bff; --purple:#a78bfa; --orange:#ff9c5b;
    --star:#f6c453;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body {
    font-family:'Inter','IBM Plex Sans Thai',-apple-system,BlinkMacSystemFont,sans-serif;
    background:var(--bg); color:var(--text); font-size:14px; line-height:1.55; min-height:100vh;
  }
  a { color:inherit; text-decoration:none; }
  .mono { font-family:'JetBrains Mono',monospace; }
  .pos { color:var(--green); }
  .neg { color:var(--red); }
  .neu { color:var(--muted); }

  /* Header */
  header {
    position:sticky; top:0; z-index:20;
    background:rgba(11,15,23,0.92); backdrop-filter:blur(12px);
    border-bottom:1px solid var(--line); padding:12px 24px;
  }
  .header-row { display:flex; align-items:center; gap:16px; max-width:1200px; margin:0 auto; }
  .back {
    display:inline-flex; align-items:center; gap:6px; font-size:13px; color:var(--muted);
    padding:6px 10px; border-radius:6px; border:1px solid var(--line); background:var(--panel);
    transition:all 0.15s;
  }
  .back:hover { color:var(--text); border-color:#334559; }
  .crumb { color:var(--muted); font-size:12px; margin-left:auto; display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  .crumb .asof { color:var(--text); font-family:'JetBrains Mono',monospace; }
  .crumb .ago { font-size:11px; padding:2px 8px; border-radius:10px; background:var(--panel); border:1px solid var(--line); }
  .crumb .ago.fresh { color:var(--green); border-color:rgba(34,211,160,0.35); }
  .crumb .ago.stale { color:var(--yellow); border-color:rgba(245,196,81,0.35); }
  .crumb .dot { width:6px; height:6px; border-radius:50%; background:var(--green); display:inline-block; margin-right:6px; vertical-align:middle; }

  /* Price chart */
  .chart-card { background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:18px 22px; margin-bottom:22px; }
  .chart-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; flex-wrap:wrap; gap:8px; }
  .chart-head .t { font-size:13px; color:var(--muted); font-weight:700; text-transform:uppercase; letter-spacing:0.05em; display:flex; align-items:center; gap:8px; }
  .chart-head .t::before { content:''; width:3px; height:14px; background:var(--blue); border-radius:1px; }
  .chart-legend { display:flex; gap:14px; font-size:11px; color:var(--muted); }
  .chart-legend span::before { content:''; display:inline-block; width:10px; height:2px; vertical-align:middle; margin-right:5px; }
  .chart-legend .l-px::before { background:var(--blue); height:2px; }
  .chart-legend .l-sup::before { background:var(--yellow); border-top:1.5px dashed var(--yellow); height:0; }
  .chart-legend .l-res::before { background:var(--red); border-top:1.5px dashed var(--red); height:0; }
  .chart-legend .l-fv::before { background:var(--purple); border-top:1.5px dashed var(--purple); height:0; }
  .chart-legend .l-entry::before { background:rgba(34,211,160,0.35); height:8px; }
  .price-chart { width:100%; height:280px; display:block; }
  .price-chart .grid line { stroke:var(--line); stroke-width:1; }
  .price-chart .axis text { fill:var(--muted); font-size:10px; font-family:'JetBrains Mono',monospace; }
  .price-chart .area { fill:rgba(91,155,255,0.10); stroke:none; }
  .price-chart .line { fill:none; stroke:var(--blue); stroke-width:1.6; }
  .price-chart .sup-line { stroke:var(--yellow); stroke-width:1.2; stroke-dasharray:4 3; fill:none; }
  .price-chart .res-line { stroke:var(--red); stroke-width:1.2; stroke-dasharray:4 3; fill:none; }
  .price-chart .fv-line { stroke:var(--purple); stroke-width:1.2; stroke-dasharray:4 3; fill:none; }
  .price-chart .entry-band { fill:rgba(34,211,160,0.12); stroke:none; }
  .price-chart .label { fill:var(--text); font-size:10px; font-family:'JetBrains Mono',monospace; }
  .price-chart .label.sup { fill:var(--yellow); }
  .price-chart .label.res { fill:var(--red); }
  .price-chart .label.fv { fill:var(--purple); }

  .wrap { max-width:1200px; margin:0 auto; padding:24px; }

  /* Hero */
  .hero { display:grid; grid-template-columns:1fr auto; gap:24px; align-items:start; margin-bottom:24px; }
  .hero-main h1 { font-size:32px; font-weight:800; letter-spacing:-0.025em; display:flex; align-items:baseline; gap:12px; }
  .hero-main h1 .sym-logo {
    width:44px; height:44px; border-radius:10px; display:inline-flex; align-items:center; justify-content:center;
    font-size:15px; font-weight:800; color:#0b0f17;
  }
  .hero-main .name { font-size:15px; color:var(--muted); margin-top:6px; }
  .hero-main .tags { margin-top:10px; display:flex; gap:6px; flex-wrap:wrap; }
  .tag {
    padding:3px 9px; border-radius:5px; font-size:11px; font-weight:600;
    background:var(--panel); border:1px solid var(--line); color:var(--muted); text-transform:uppercase; letter-spacing:0.03em;
  }
  .tag.hi { color:var(--blue); border-color:rgba(91,155,255,0.3); background:rgba(91,155,255,0.1); }

  .hero-price { text-align:right; min-width:180px; }
  .hero-price .sess { display:inline-block; margin-left:10px; padding:2px 8px; border-radius:5px; font-size:11px; font-weight:700; font-family:'JetBrains Mono',monospace; letter-spacing:0.04em; vertical-align:middle; }
  .hero-price .sess.pre    { background:rgba(255,196,61,0.20);  color:var(--yellow); }
  .hero-price .sess.post   { background:rgba(138,92,255,0.20);  color:var(--purple); }
  .hero-price .sess.closed { background:rgba(148,163,184,0.18); color:var(--muted);  }
  .hero-price .big { font-size:36px; font-weight:800; font-family:'JetBrains Mono',monospace; letter-spacing:-0.02em; }
  .hero-price .chg { font-size:15px; font-weight:600; margin-top:2px; }
  .hero-price .chg span { margin-right:10px; }

  /* Dip score card */
  .dip-card { background:linear-gradient(135deg, var(--panel) 0%, var(--panel-2) 100%); border:1px solid var(--line); border-radius:14px; padding:20px 22px; margin-bottom:22px; }
  .dip-row { display:flex; align-items:center; gap:20px; flex-wrap:wrap; }
  .dip-score {
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    width:100px; height:100px; border-radius:14px; flex-shrink:0;
    font-family:'JetBrains Mono',monospace;
  }
  .dip-score .n { font-size:40px; font-weight:800; letter-spacing:-0.04em; line-height:1; }
  .dip-score .l { font-size:10px; letter-spacing:0.08em; margin-top:4px; opacity:0.7; }
  .dip-score.s80 { background:rgba(34,211,160,0.18); color:var(--green); border:1px solid rgba(34,211,160,0.4); }
  .dip-score.s65 { background:rgba(91,155,255,0.18); color:var(--blue); border:1px solid rgba(91,155,255,0.4); }
  .dip-score.s50 { background:rgba(245,196,81,0.14); color:var(--yellow); border:1px solid rgba(245,196,81,0.35); }
  .dip-score.s0  { background:var(--panel-2); color:var(--muted); border:1px solid var(--line); }

  /* Momentum score (side-by-side with dip score) */
  .mom-score {
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    width:90px; height:100px; border-radius:14px; flex-shrink:0;
    font-family:'JetBrains Mono',monospace;
  }
  .mom-score .n { font-size:34px; font-weight:800; letter-spacing:-0.04em; line-height:1; }
  .mom-score .d { font-size:11px; opacity:0.5; margin-top:-2px; }
  .mom-score .l { font-size:10px; letter-spacing:0.08em; margin-top:4px; opacity:0.7; }
  .mom-score.m25 { background:rgba(34,211,160,0.18); color:var(--green); border:1px solid rgba(34,211,160,0.4); }
  .mom-score.m15 { background:rgba(91,155,255,0.18); color:var(--blue); border:1px solid rgba(91,155,255,0.4); }
  .mom-score.m10 { background:rgba(245,196,81,0.14); color:var(--yellow); border:1px solid rgba(245,196,81,0.35); }
  .mom-score.m0  { background:rgba(255,90,106,0.14); color:var(--red); border:1px solid rgba(255,90,106,0.35); }

  /* Rotation flag pill */
  .rot-flag {
    display:inline-block; padding:3px 10px; border-radius:999px;
    font-size:11px; font-weight:700; letter-spacing:0.04em;
    margin-left:8px; vertical-align:middle;
  }
  .rot-flag.setup_ready   { background:rgba(34,211,160,0.22);  color:var(--green); border:1px solid rgba(34,211,160,0.35); }
  .rot-flag.wait_confirm  { background:rgba(245,196,81,0.18);  color:var(--yellow); border:1px solid rgba(245,196,81,0.35); }
  .rot-flag.falling_knife { background:rgba(255,90,106,0.2);   color:var(--red); border:1px solid rgba(255,90,106,0.35); }

  .dip-head { flex:1; min-width:240px; }
  .dip-head .h { font-size:17px; font-weight:700; color:var(--text); letter-spacing:-0.01em; margin-bottom:6px; line-height:1.4; }
  .dip-head .p { font-size:13px; color:var(--muted); line-height:1.6; }
  .dip-signals { display:flex; gap:5px; flex-wrap:wrap; margin-top:10px; }
  .sig { padding:2px 8px; border-radius:4px; font-size:10px; font-weight:700; background:var(--panel-2); color:var(--muted); text-transform:uppercase; letter-spacing:0.04em; }
  .sig.sig-pull { background:rgba(255,90,106,0.14); color:var(--red); }
  .sig.sig-rsi { background:rgba(34,211,160,0.14); color:var(--green); }
  .sig.sig-macd { background:rgba(91,155,255,0.14); color:var(--blue); }
  .sig.sig-fv { background:rgba(167,139,250,0.16); color:var(--purple); }
  .sig.sig-bb { background:rgba(255,156,91,0.14); color:var(--orange); }
  .sig.sig-sup { background:rgba(245,196,81,0.14); color:var(--yellow); }

  /* Entry zone highlight */
  .entry-card { background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:18px 22px; margin-bottom:22px; }
  .entry-head { font-size:12px; color:var(--muted); font-weight:600; text-transform:uppercase; letter-spacing:0.05em; margin-bottom:12px; display:flex; align-items:center; gap:8px; }
  .entry-head::before { content:''; width:3px; height:14px; background:var(--green); border-radius:1px; }
  .entry-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:14px; }
  .entry-box { background:var(--panel-2); border:1px solid var(--line); border-radius:10px; padding:12px 14px; }
  .entry-box .l { font-size:10px; color:var(--muted); font-weight:600; text-transform:uppercase; letter-spacing:0.04em; margin-bottom:4px; }
  .entry-box .v { font-size:18px; font-weight:700; font-family:'JetBrains Mono',monospace; letter-spacing:-0.01em; }
  .entry-box.entry .v { color:var(--green); }
  .entry-box.stop .v { color:var(--red); }
  .entry-box.t1 .v, .entry-box.t2 .v { color:var(--blue); }
  .entry-box .sub { font-size:10px; color:var(--muted); margin-top:2px; }

  /* Grid layout */
  .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:18px; margin-bottom:22px; }
  .card { background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:18px 22px; }
  .card h2 { font-size:13px; color:var(--muted); font-weight:700; text-transform:uppercase; letter-spacing:0.05em; margin-bottom:14px; display:flex; align-items:center; gap:8px; }
  .card h2::before { content:''; width:3px; height:14px; background:var(--blue); border-radius:1px; }
  .card h2.val::before { background:var(--purple); }
  .card h2.tech::before { background:var(--orange); }
  .card h2.fund::before { background:var(--green); }
  .card h2.rev::before  { background:var(--yellow); }
  .card h2.sw::before   { background:var(--green); }
  .sw-score {
    font-size:11px; font-weight:700;
    color:var(--green); background:rgba(34,211,160,0.18);
    padding:2px 7px; border-radius:4px; margin-left:6px;
    font-family:'JetBrains Mono',monospace;
  }
  .sw-sigs { display:flex; flex-wrap:wrap; gap:5px; margin:4px 0 12px; }
  .sw-sig {
    font-size:10px; padding:3px 8px; border-radius:3px;
    font-family:'JetBrains Mono',monospace;
    font-weight:700; letter-spacing:0.04em;
    color:var(--green); background:rgba(34,211,160,0.16);
  }
  .sw-entry-grid { margin:6px 0 12px; }
  .card h2.aith::before { background:var(--purple); }
  .ai-score {
    font-size:11px; font-weight:700; color:var(--purple);
    background:rgba(167,139,250,0.18);
    padding:2px 7px; border-radius:4px;
    margin-left:6px;
    font-family:'JetBrains Mono',monospace;
  }
  .ai-chips { display:flex; flex-wrap:wrap; gap:5px; margin:4px 0 12px; }
  .ai-chip {
    font-size:10px; padding:3px 8px; border-radius:3px;
    font-family:'JetBrains Mono',monospace;
    font-weight:700; letter-spacing:0.04em;
  }
  .ai-chip.ai-pivot { color:var(--red);    background:rgba(255,90,106,0.18); }
  .ai-chip.ai-news  { color:var(--purple); background:rgba(167,139,250,0.18); }
  .ai-chip.ai-theme { color:var(--blue);   background:rgba(91,155,255,0.16); }
  .ai-tag {
    display:inline-block; margin-left:5px;
    font-size:10px; padding:1px 6px; border-radius:3px;
    font-family:'JetBrains Mono',monospace;
    color:var(--blue); background:rgba(91,155,255,0.14);
  }
  .ai-headline {
    font-size:12px; color:var(--text);
    line-height:1.55; margin-top:4px;
  }
  .ai-news-row { align-items:flex-start; }
  .card h2.cat::before { background:var(--yellow); }
  .fund-score, .rev-score {
    font-size:11px; color:var(--yellow);
    background:rgba(253,209,92,0.18);
    padding:2px 7px; border-radius:4px;
    margin-left:6px; font-weight:700;
    font-family:'JetBrains Mono',monospace;
  }
  .fund-sigs, .rev-sigs {
    display:flex; flex-wrap:wrap; gap:5px;
    margin:6px 0 12px;
  }
  .fund-sig, .rev-sig {
    font-size:10px; padding:2px 7px;
    border-radius:3px;
    font-family:'JetBrains Mono',monospace;
    letter-spacing:0.04em; font-weight:700;
  }
  .fund-sig { color:var(--green); background:rgba(34,211,160,0.16); }
  .rev-sig  { color:var(--yellow); background:rgba(253,209,92,0.18); }
  .card h2.news::before { background:var(--blue); }
  .card h2.ins::before { background:var(--purple); }
  .card h2 .src-tag {
    margin-left:auto; font-size:9px; padding:2px 7px; border-radius:4px;
    background:var(--panel-2); color:var(--muted); border:1px solid var(--line);
    font-weight:600; text-transform:uppercase; letter-spacing:0.04em;
  }

  /* News feed */
  .news-list { display:flex; flex-direction:column; gap:10px; }
  .news-item {
    padding:10px 0; border-bottom:1px dashed var(--line);
    display:flex; flex-direction:column; gap:4px;
  }
  .news-item:last-child { border-bottom:none; padding-bottom:0; }
  .news-item .hl { font-size:13px; font-weight:600; color:var(--text); line-height:1.4; }
  .news-item .hl a { color:var(--text); }
  .news-item .hl a:hover { color:var(--blue); text-decoration:underline; }
  .news-item .meta { font-size:11px; color:var(--sub); display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
  .news-item .meta .src { color:var(--muted); font-weight:600; }
  .news-item .meta .ts { font-family:'JetBrains Mono',monospace; }
  .news-item .sum { font-size:12px; color:var(--muted); line-height:1.5; margin-top:2px; }
  .news-item .hl-en, .news-item .sum-en {
    font-size:11px; color:var(--sub); line-height:1.45; margin-top:2px;
    font-style:italic; opacity:0.75;
  }
  .news-item .hl-en { font-weight:500; }
  .news-item .lang-toggle {
    display:inline-block; margin-left:6px; font-size:10px; padding:1px 6px;
    border-radius:4px; background:var(--panel-2); color:var(--muted);
    border:1px solid var(--line); cursor:pointer; user-select:none;
    font-weight:600; text-transform:uppercase; letter-spacing:0.04em;
  }
  .news-item .lang-toggle:hover { color:var(--blue); border-color:var(--blue); }
  .news-item.show-en .hl-th, .news-item.show-en .sum-th { display:none; }
  .news-item:not(.show-en) .hl-en, .news-item:not(.show-en) .sum-en { display:none; }

  /* Insider */
  .ins-summary {
    display:flex; gap:14px; margin-bottom:10px; padding:10px 0;
    border-bottom:1px dashed var(--line);
  }
  .ins-pill {
    flex:1; text-align:center; padding:8px;
    background:var(--panel-2); border-radius:8px; border:1px solid var(--line);
  }
  .ins-pill .label { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:0.05em; }
  .ins-pill .val { font-size:17px; font-weight:800; font-family:'JetBrains Mono',monospace; margin-top:3px; }
  .ins-pill.buy .val { color:var(--green); }
  .ins-pill.sell .val { color:var(--red); }
  .ins-row { display:flex; justify-content:space-between; padding:6px 0; font-size:12px; border-bottom:1px dashed var(--line); }
  .ins-row:last-child { border-bottom:none; }
  .ins-row .who { color:var(--text); max-width:55%; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .ins-row .amt { font-family:'JetBrains Mono',monospace; font-weight:600; }
  .ins-row .amt.buy { color:var(--green); }
  .ins-row .amt.sell { color:var(--red); }

  /* Metric list */
  .mrow { display:flex; align-items:center; justify-content:space-between; padding:8px 0; border-bottom:1px dashed var(--line); font-size:13px; }
  .mrow:last-child { border-bottom:none; }
  .mrow .k { color:var(--muted); }
  .mrow .v { font-weight:600; font-family:'JetBrains Mono',monospace; font-size:13px; }
  .mrow .v.thai { font-family:inherit; }

  /* Morningstar-style valuation */
  .val-top { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:14px; }
  .val-big { background:var(--panel-2); border:1px solid var(--line); border-radius:10px; padding:12px 14px; }
  .val-big .l { font-size:10px; color:var(--muted); text-transform:uppercase; font-weight:600; letter-spacing:0.04em; }
  .val-big .v { font-size:20px; font-weight:700; font-family:'JetBrains Mono',monospace; margin-top:3px; }
  .val-big .sub { font-size:11px; color:var(--muted); margin-top:2px; }
  .stars { color:var(--star); font-size:20px; letter-spacing:-1px; }
  .stars .off { color:var(--line); }
  .moat-wide { color:var(--green); font-weight:700; }
  .moat-narrow { color:var(--yellow); font-weight:700; }
  .moat-none { color:var(--muted); }
  .fh-strong { color:var(--green); }
  .fh-mod { color:var(--yellow); }
  .fh-weak { color:var(--red); }

  /* Range bar */
  .range {
    position:relative; height:8px; background:var(--panel-2); border:1px solid var(--line); border-radius:4px; margin:10px 0 2px;
  }
  .range .fill { position:absolute; top:0; bottom:0; left:0; background:linear-gradient(90deg, var(--green) 0%, var(--blue) 100%); border-radius:3px; }
  .range .mark { position:absolute; top:-4px; width:3px; height:16px; background:var(--text); border-radius:2px; }
  .range-labels { display:flex; justify-content:space-between; font-size:10px; color:var(--muted); margin-top:4px; font-family:'JetBrains Mono',monospace; }

  /* Thai narrative */
  .narr { background:linear-gradient(135deg, var(--panel) 0%, var(--panel-2) 100%); border:1px solid var(--line); border-radius:14px; padding:22px; margin-bottom:22px; }
  .narr h2 { font-size:13px; color:var(--muted); font-weight:700; text-transform:uppercase; letter-spacing:0.05em; margin-bottom:16px; display:flex; align-items:center; gap:8px; }
  .narr h2::before { content:''; width:3px; height:14px; background:var(--green); border-radius:1px; }
  .narr .head {
    font-family:'IBM Plex Sans Thai','Inter',sans-serif;
    font-size:20px; font-weight:600; line-height:1.5; margin-bottom:12px; color:var(--text);
    letter-spacing:-0.005em;
  }
  .narr .sum { font-family:'IBM Plex Sans Thai',sans-serif; font-size:14px; color:var(--text); line-height:1.75; margin-bottom:16px; opacity:0.9; }
  .narr h3 { font-size:11px; color:var(--muted); font-weight:700; text-transform:uppercase; letter-spacing:0.05em; margin:14px 0 8px; }

  .narr li {

  .narr .risks li::before { background:var(--red); }
  .narr .thesis {

    font-family:'IBM Plex Sans Thai',sans-serif; font-size:14px; color:var(--green); font-weight:600;
  }
  .narr .thesis::before { content:'💡 THESIS: '; font-size:10px; color:var(--muted); letter-spacing:0.05em; margin-right:4px; font-weight:700; }

  /* Disclaimer */
  .disc { font-size:11px; color:var(--sub); text-align:center; padding:20px 0 40px; line-height:1.7; }
  .disc strong { color:var(--muted); }

  .state { padding:80px 24px; text-align:center; color:var(--muted); }
  .spinner { display:inline-block; width:22px; height:22px; border:2px solid var(--line); border-top-color:var(--blue); border-radius:50%; animation:spin 0.8s linear infinite; margin-right:10px; vertical-align:middle; }
  @keyframes spin { to { transform:rotate(360deg); } }

  /* Responsive */
  @media (max-width:900px) {
    .hero { grid-template-columns:1fr; }
    .hero-price { text-align:left; }
    .entry-grid { grid-template-columns:repeat(2,1fr); }
    .grid2 { grid-template-columns:1fr; }
    .hero-main h1 { font-size:26px; }
    .hero-price .big { font-size:30px; }
    .val-top { grid-template-columns:1fr 1fr; }
  }
</style>
</head>
<body>
<header>
  <div class="header-row">
    <a href="../index.html" class="back">← Back to scanner</a>
    <div class="crumb">
      <span><span class="dot"></span>As of <span class="asof" id="asof">—</span></span>
      <span id="ago" class="ago">—</span>
    </div>
  </div>
</header>

<div class="wrap" id="content">
  <div class="state"><span class="spinner"></span>Loading ticker data…</div>
</div>

<script>
// SYMBOL is injected by generator - replace "AAPL"
const SYMBOL = "MUR";

// ===================== formatters =====================
function stars(n) {
  if (!n) return '<span class="stars"><span class="off">★★★★★</span></span>';
  let h = '<span class="stars">';
  for (let i=1;i<=5;i++) h += (i<=n) ? '★' : '<span class="off">★</span>';
  return h + '</span>';
}
function fmtPct(v, d=1) { if (v==null||isNaN(v)) return '—'; const s = v>0?'+':''; return s + v.toFixed(d) + '%'; }
function fmtNum(v, d=2) { if (v==null||isNaN(v)) return '—'; return v.toFixed(d); }
function sessBadge(s){
  if (!s || s === 'REG') return '';
  const label = s === 'PRE' ? 'PRE' : (s === 'POST' ? 'POST' : 'CLOSED');
  const cls   = s.toLowerCase();
  return `<span class="sess ${cls}" title="Extended-hours price (US ${label})">${label}</span>`;
}
function fmtUSD(v, d=2) { if (v==null||isNaN(v)) return '—'; return '$' + v.toFixed(d); }
function fmtB(v) { if (v==null||isNaN(v)) return '—'; return v >= 1000 ? (v/1000).toFixed(2)+'T' : v.toFixed(1)+'B'; }
function pctCls(v) { if (v==null) return 'neu'; return v>0 ? 'pos' : v<0 ? 'neg' : 'neu'; }
function dipCls(n) { if (n>=80) return 's80'; if (n>=65) return 's65'; if (n>=50) return 's50'; return 's0'; }
function moatCls(m) { return m==='Wide' ? 'moat-wide' : m==='Narrow' ? 'moat-narrow' : 'moat-none'; }
function fhCls(h) { return h==='Strong'?'fh-strong' : h==='Moderate'?'fh-mod' : 'fh-weak'; }
function esc(s) { return String(s==null?'':s).replace(/[<>&]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;'}[c])); }

function sigClass(s) {
  if (!s) return '';
  if (s.includes('pullback')) return 'sig-pull';
  if (s.includes('rsi')) return 'sig-rsi';
  if (s.includes('macd')) return 'sig-macd';
  if (s.includes('fair_value')||s.includes('discount')) return 'sig-fv';
  if (s.includes('bb')||s.includes('bollinger')) return 'sig-bb';
  if (s.includes('support')) return 'sig-sup';
  return '';
}
function sigLabel(s) {
  const map = {
    'pullback_>20pct':'PULL -20%','pullback_>15pct':'PULL -15%','pullback_>10pct':'PULL -10%',
    'rsi_oversold_recovery':'RSI OVERSOLD','macd_bullish_cross':'MACD BULLISH',
    'fair_value_discount_>15pct':'FV -15%','fair_value_discount_>10pct':'FV -10%',
    'near_support_level':'NEAR SUPPORT','near_bb_lower':'NEAR BB LOWER','wide_moat_4star':'WIDE MOAT',
    'volume_surge':'VOL SURGE','near_52w_low':'NEAR 52W LOW',
  };
  return map[s] || String(s).replace(/_/g,' ').toUpperCase();
}

function relativeTime(iso) {
  if (!iso) return '';
  const t = Date.parse(iso);
  if (isNaN(t)) return '';
  const s = Math.floor((Date.now() - t) / 1000);
  if (s < 60) return 'just now';
  if (s < 3600) return Math.floor(s/60) + ' min ago';
  if (s < 86400) return Math.floor(s/3600) + ' hr ago';
  return Math.floor(s/86400) + ' day' + (Math.floor(s/86400)===1?'':'s') + ' ago';
}

function updateAgo(iso) {
  const el = document.getElementById('ago');
  if (!el || !iso) return;
  const s = Math.floor((Date.now() - Date.parse(iso)) / 1000);
  el.textContent = relativeTime(iso);
  el.className = 'ago ' + (s < 3600 ? 'fresh' : s < 86400 ? '' : 'stale');
}

// ===================== price chart =====================
function buildChart(t) {
  const hist = t.history;
  if (!hist || !hist.closes || hist.closes.length < 2) {
    return '<div style="padding:40px; text-align:center; color:var(--muted);">No price history available</div>';
  }
  const closes = hist.closes, dates = hist.dates || [];
  const W = 1040, H = 260, padL = 42, padR = 12, padT = 14, padB = 28;
  const innerW = W - padL - padR, innerH = H - padT - padB;

  const tech = t.tech || {};
  const val = t.val || {};
  const entry = t.entry || {};
  const extras = [tech.support, tech.resistance, val.fair_value, entry.entry_low, entry.entry_high, entry.stop_loss]
    .filter(x => x != null && !isNaN(x));
  const lo = Math.min(...closes, ...extras);
  const hi = Math.max(...closes, ...extras);
  const rng = (hi - lo) || 1;
  const pad = rng * 0.06;
  const yLo = lo - pad, yHi = hi + pad;
  const yRng = yHi - yLo;

  const x = i => padL + (i / (closes.length - 1)) * innerW;
  const y = v => padT + (1 - (v - yLo) / yRng) * innerH;

  const linePath = 'M' + closes.map((c, i) => `${x(i).toFixed(1)},${y(c).toFixed(1)}`).join('L');
  const areaPath = linePath + `L${x(closes.length-1).toFixed(1)},${padT + innerH} L${x(0).toFixed(1)},${padT + innerH} Z`;

  const yTicks = [];
  for (let i = 0; i <= 4; i++) {
    const v = yLo + (yRng / 4) * i;
    yTicks.push({ v, y: y(v) });
  }
  const xTicks = [];
  const step = Math.max(1, Math.floor(closes.length / 5));
  for (let i = 0; i < closes.length; i += step) {
    xTicks.push({ i, label: dates[i] ? dates[i].slice(5) : '' });
  }
  if (xTicks.length && xTicks[xTicks.length-1].i !== closes.length - 1) {
    xTicks.push({ i: closes.length - 1, label: dates[closes.length - 1] ? dates[closes.length - 1].slice(5) : '' });
  }

  const entryBand = (entry.entry_low && entry.entry_high)
    ? `<rect class="entry-band" x="${padL}" y="${y(entry.entry_high)}" width="${innerW}" height="${y(entry.entry_low) - y(entry.entry_high)}"/>`
    : '';

  const supLine = tech.support ? `<line class="sup-line" x1="${padL}" x2="${padL+innerW}" y1="${y(tech.support)}" y2="${y(tech.support)}"/>
    <text class="label sup" x="${padL+innerW-4}" y="${y(tech.support)-4}" text-anchor="end">SUP $${tech.support.toFixed(2)}</text>` : '';
  const resLine = tech.resistance ? `<line class="res-line" x1="${padL}" x2="${padL+innerW}" y1="${y(tech.resistance)}" y2="${y(tech.resistance)}"/>
    <text class="label res" x="${padL+innerW-4}" y="${y(tech.resistance)-4}" text-anchor="end">RES $${tech.resistance.toFixed(2)}</text>` : '';
  const fvLine = val.fair_value ? `<line class="fv-line" x1="${padL}" x2="${padL+innerW}" y1="${y(val.fair_value)}" y2="${y(val.fair_value)}"/>
    <text class="label fv" x="${padL+innerW-4}" y="${y(val.fair_value)-4}" text-anchor="end">FV $${val.fair_value.toFixed(2)}</text>` : '';

  return `
  <svg class="price-chart" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
    <g class="grid">
      ${yTicks.map(tk => `<line x1="${padL}" x2="${padL+innerW}" y1="${tk.y.toFixed(1)}" y2="${tk.y.toFixed(1)}"/>`).join('')}
    </g>
    ${entryBand}
    <path class="area" d="${areaPath}"/>
    <path class="line" d="${linePath}"/>
    ${supLine}
    ${resLine}
    ${fvLine}
    <g class="axis">
      ${yTicks.map(tk => `<text x="${padL-6}" y="${(tk.y+3).toFixed(1)}" text-anchor="end">$${tk.v.toFixed(0)}</text>`).join('')}
      ${xTicks.map(tk => `<text x="${x(tk.i).toFixed(1)}" y="${H - 8}" text-anchor="middle">${tk.label}</text>`).join('')}
    </g>
  </svg>`;
}

// ===================== section renderers (resilient) =====================
function renderHero(t) {
  return `
  <div class="hero">
    <div class="hero-main">
      <h1><span class="sym-logo" style="background:${t.logo_color||'#5b9bff'}">${esc(t.symbol).slice(0,2)}</span> ${esc(t.symbol)}</h1>
      <div class="name">${esc(t.name || t.symbol)}</div>
      <div class="tags">
        ${t.sector ? `<span class="tag hi">${esc(t.sector)}</span>` : ''}
        ${t.industry ? `<span class="tag">${esc(t.industry)}</span>` : ''}
        ${t.market_cap_b ? `<span class="tag">MCap ${fmtB(t.market_cap_b)}</span>` : ''}
        ${Array.isArray(t.indices) && t.indices.length ? `<span class="tag">${t.indices.join(' · ')}</span>` : ''}
      </div>
    </div>
    <div class="hero-price">
      <div class="big">${fmtUSD(t.price)}${sessBadge(t.session)}</div>
      <div class="chg">
        <span class="${pctCls(t.change_d1_pct)}">${fmtPct(t.change_d1_pct)} 1D</span>
        <span class="${pctCls(t.change_1m_pct)}">${fmtPct(t.change_1m_pct)} 1M</span>
        <span class="${pctCls(t.change_ytd_pct)}">${fmtPct(t.change_ytd_pct)} YTD</span>
      </div>
    </div>
  </div>`;
}

function momCls(n) {
  if (n == null) return 'm0';
  if (n >= 25) return 'm25';
  if (n >= 15) return 'm15';
  if (n >= 10) return 'm10';
  return 'm0';
}
function rotMeta(r) {
  // Returns [label, explainer]
  if (r === 'setup_ready')   return ['🎯 SETUP READY', 'ดีลลึก + momentum กลับขึ้นแล้ว — actionable'];
  if (r === 'wait_confirm')  return ['⏳ WAIT CONFIRM', 'ดีลลึก แต่ momentum ยังไม่มา — รอสัญญาณ reversal'];
  if (r === 'falling_knife') return ['🔪 FALLING KNIFE', 'ดีลลึกมาก แต่ยังลงต่อเนื่อง — หลีกเลี่ยง'];
  return ['', ''];
}
function momSigClass(s) {
  if (!s) return '';
  const u = s.toUpperCase();
  if (u.includes('EMA') || u.includes('PX>'))   return 'sig-macd';
  if (u.includes('RSI'))                         return 'sig-rsi';
  if (u.includes('HIGHER') || u.includes('5D'))  return 'sig-fv';
  if (u.includes('ACCUMULATION'))                return 'sig-bb';
  if (u.includes('20D'))                         return 'sig-sup';
  return '';
}

function renderDipCard(t) {
  const narr = t.narrative_th || {};
  const headline = narr.headline || `Dip Score ${t.dip_score||0} · signals from price action`;
  const sigChips = (t.dip_signals || []).map(s => `<span class="sig ${sigClass(s)}">${sigLabel(s)}</span>`).join('');
  const momChips = (t.momentum_signals || []).map(s => `<span class="sig ${momSigClass(s)}">${esc(s)}</span>`).join('');
  const mom = (t.momentum_score != null) ? t.momentum_score : 0;
  const [rotLabel, rotNote] = rotMeta(t.rotation_flag || '');
  const rotHtml = rotLabel ? `<span class="rot-flag ${t.rotation_flag}">${rotLabel}</span>` : '';
  return `
  <div class="dip-card">
    <div class="dip-row">
      <div class="dip-score ${dipCls(t.dip_score)}">
        <div class="n">${t.dip_score||0}</div>
        <div class="l">DIP SCORE</div>
      </div>
      <div class="mom-score ${momCls(mom)}">
        <div class="n">${mom}</div>
        <div class="d">/35</div>
        <div class="l">MOMENTUM</div>
      </div>
      <div class="dip-head">
        <div class="h">${esc(headline)}${rotHtml}</div>
        <div class="p">Dip (0-100) = ดีลลึกแค่ไหน · Momentum (0-35) = เริ่มกลับขึ้นแค่ไหน${rotNote ? ' · <em>'+esc(rotNote)+'</em>' : ''}</div>
        <div class="dip-signals">${sigChips}${momChips ? ' <span style="opacity:0.4">|</span> '+momChips : ''}</div>
      </div>
    </div>
  </div>`;
}

function renderEntryZone(t) {
  const e = t.entry;
  if (!e) return '';
  return `
  <div class="entry-card">
    <div class="entry-head">Suggested Entry Zone</div>
    <div class="entry-grid">
      <div class="entry-box entry">
        <div class="l">Entry Low</div>
        <div class="v">${fmtUSD(e.entry_low)}</div>
        <div class="sub">at support</div>
      </div>
      <div class="entry-box entry">
        <div class="l">Entry High</div>
        <div class="v">${fmtUSD(e.entry_high)}</div>
        <div class="sub">current area</div>
      </div>
      <div class="entry-box stop">
        <div class="l">Stop Loss</div>
        <div class="v">${fmtUSD(e.stop_loss)}</div>
        <div class="sub">${t.price && e.stop_loss ? fmtPct((e.stop_loss/t.price-1)*100) : '—'}</div>
      </div>
      <div class="entry-box t1">
        <div class="l">Target 1</div>
        <div class="v">${fmtUSD(e.target_1)}</div>
        <div class="sub">${t.price && e.target_1 ? fmtPct((e.target_1/t.price-1)*100) : '—'} · resistance</div>
      </div>
      <div class="entry-box t2">
        <div class="l">Target 2 (FV)</div>
        <div class="v">${fmtUSD(e.target_2)}</div>
        <div class="sub">${t.price && e.target_2 ? fmtPct((e.target_2/t.price-1)*100) : '—'} · R/R ${fmtNum(e.risk_reward,1)}</div>
      </div>
    </div>
  </div>`;
}

function renderChart(t) {
  return `
  <div class="chart-card">
    <div class="chart-head">
      <div class="t">Price Chart · ${t.history && t.history.closes ? t.history.closes.length+' Days' : '—'}</div>
      <div class="chart-legend">
        <span class="l-px">Close</span>
        ${t.entry ? '<span class="l-entry">Entry zone</span>' : ''}
        ${t.tech && t.tech.support ? '<span class="l-sup">Support</span>' : ''}
        ${t.tech && t.tech.resistance ? '<span class="l-res">Resistance</span>' : ''}
        ${t.val && t.val.fair_value ? '<span class="l-fv">Fair Value</span>' : ''}
      </div>
    </div>
    ${buildChart(t)}
  </div>`;
}

function renderValuation(t) {
  if (!t.val) return '';
  const v = t.val;
  const disc = v.discount_to_fv_pct;
  const discCls = disc == null ? 'neu' : disc > 0 ? 'pos' : 'neg';
  const rows = [
    v.analyst_consensus != null ? `<div class="mrow"><span class="k">Analyst Consensus</span><span class="v thai">${esc(v.analyst_consensus)}</span></div>` : '',
    v.avg_price_target != null ? `<div class="mrow"><span class="k">Avg Price Target</span><span class="v">${fmtUSD(v.avg_price_target)}</span></div>` : '',
    v.high_price_target != null ? `<div class="mrow"><span class="k">High Target</span><span class="v">${fmtUSD(v.high_price_target)}</span></div>` : '',
    v.low_price_target != null ? `<div class="mrow"><span class="k">Low Target</span><span class="v">${fmtUSD(v.low_price_target)}</span></div>` : '',
    v.uncertainty ? `<div class="mrow"><span class="k">Uncertainty</span><span class="v thai">${esc(v.uncertainty)}</span></div>` : '',
    v.financial_health ? `<div class="mrow"><span class="k">Financial Health</span><span class="v ${fhCls(v.financial_health)}">${esc(v.financial_health)}</span></div>` : '',
  ].filter(Boolean).join('');
  return `
  <div class="card">
    <h2 class="val">Valuation (Morningstar-style)</h2>
    <div class="val-top">
      <div class="val-big">
        <div class="l">Fair Value</div>
        <div class="v">${fmtUSD(v.fair_value)}</div>
        <div class="sub ${discCls}">${disc==null?'—':fmtPct(disc)+' vs price'}</div>
      </div>
      <div class="val-big">
        <div class="l">Star Rating${v.rating_source === 'auto_dip' ? ' <span class="src-tag" style="font-size:8px; margin-left:4px;">AUTO</span>' : ''}</div>
        <div class="v">${stars(v.star_rating)}</div>
        <div class="sub">${v.moat ? `<span class="${moatCls(v.moat)}">${esc(v.moat)} Moat</span>` : (v.rating_source === 'auto_dip' ? '<span class="neu">derived from dip score</span>' : '')}</div>
      </div>
    </div>
    ${rows}
  </div>`;
}

function renderTechnicals(t) {
  const tech = t.tech || {};
  const pos = t.pos_52w_pct != null ? Math.max(0, Math.min(100, t.pos_52w_pct)) : null;
  const rangeBar = pos != null ? `
    <div class="range">
      <div class="fill" style="width:${pos}%"></div>
      <div class="mark" style="left:calc(${pos}% - 1.5px)"></div>
    </div>
    <div class="range-labels"><span>52W Low ${fmtUSD(t.low_52w)}</span><span>${fmtNum(pos,0)}%</span><span>52W High ${fmtUSD(t.high_52w)}</span></div>
  ` : '';
  const emaStatus = { above_both:'Above EMA20/50', between:'Between EMA20/50', below_both:'Below EMA20/50' }[tech.ema_status] || tech.ema_status || '—';
  const bbStatus = { near_lower:'Near Lower Band', mid:'Mid', near_upper:'Near Upper Band', breakout_up:'Breakout Up', breakdown:'Breakdown' }[tech.bb_status] || tech.bb_status || '—';
  const trendLabel = { up:'⬆ Uptrend', down:'⬇ Downtrend', sideways:'⇔ Sideways' }[tech.trend] || tech.trend || '—';
  const rows = [
    `<div class="mrow"><span class="k">Trend</span><span class="v">${esc(trendLabel)}</span></div>`,
    tech.rsi_14 != null ? `<div class="mrow"><span class="k">RSI(14)</span><span class="v ${tech.rsi_14<30?'pos':tech.rsi_14>70?'neg':'neu'}">${fmtNum(tech.rsi_14,1)}</span></div>` : '',
    tech.macd_signal ? `<div class="mrow"><span class="k">MACD</span><span class="v">${esc(tech.macd_signal)}</span></div>` : '',
    `<div class="mrow"><span class="k">EMA Status</span><span class="v">${esc(emaStatus)}</span></div>`,
    `<div class="mrow"><span class="k">Bollinger</span><span class="v">${esc(bbStatus)}</span></div>`,
    tech.atr_pct != null ? `<div class="mrow"><span class="k">ATR %</span><span class="v">${fmtNum(tech.atr_pct,2)}%</span></div>` : '',
    t.volume_surge_pct != null ? `<div class="mrow"><span class="k">Volume Surge</span><span class="v ${t.volume_surge_pct>50?'pos':'neu'}">${fmtPct(t.volume_surge_pct)}</span></div>` : '',
    tech.support ? `<div class="mrow"><span class="k">Support</span><span class="v">${fmtUSD(tech.support)}</span></div>` : '',
    tech.resistance ? `<div class="mrow"><span class="k">Resistance</span><span class="v">${fmtUSD(tech.resistance)}</span></div>` : '',
    t.pullback_from_52w_high_pct != null ? `<div class="mrow"><span class="k">Pullback from 52W High</span><span class="v neg">${fmtPct(t.pullback_from_52w_high_pct)}</span></div>` : '',
  ].filter(Boolean).join('');
  return `
  <div class="card">
    <h2 class="tech">Technical Readings</h2>
    ${rangeBar}
    ${rows}
  </div>`;
}

function renderFundamentals(t) {
  if (!t.fund) return '';
  const f = t.fund;
  const rows = [
    f.pe_ttm != null ? `<div class="mrow"><span class="k">P/E TTM</span><span class="v">${fmtNum(f.pe_ttm,1)}</span></div>` : '',
    f.pe_fwd != null ? `<div class="mrow"><span class="k">P/E Forward</span><span class="v">${fmtNum(f.pe_fwd,1)}</span></div>` : '',
    f.peg != null ? `<div class="mrow"><span class="k">PEG</span><span class="v">${fmtNum(f.peg,2)}</span></div>` : '',
    f.ev_ebitda != null ? `<div class="mrow"><span class="k">EV / EBITDA</span><span class="v">${fmtNum(f.ev_ebitda,1)}</span></div>` : '',
    f.revenue_growth_yoy_pct != null ? `<div class="mrow"><span class="k">Revenue Growth YoY</span><span class="v ${pctCls(f.revenue_growth_yoy_pct)}">${fmtPct(f.revenue_growth_yoy_pct)}</span></div>` : '',
    f.eps_growth_yoy_pct != null ? `<div class="mrow"><span class="k">EPS Growth YoY</span><span class="v ${pctCls(f.eps_growth_yoy_pct)}">${fmtPct(f.eps_growth_yoy_pct)}</span></div>` : '',
    f.operating_margin_pct != null ? `<div class="mrow"><span class="k">Operating Margin</span><span class="v">${fmtPct(f.operating_margin_pct)}</span></div>` : '',
    f.roe_pct != null ? `<div class="mrow"><span class="k">ROE</span><span class="v">${fmtPct(f.roe_pct)}</span></div>` : '',
    f.debt_equity != null ? `<div class="mrow"><span class="k">Debt / Equity</span><span class="v">${fmtNum(f.debt_equity,2)}</span></div>` : '',
    f.dividend_yield_pct != null ? `<div class="mrow"><span class="k">Dividend Yield</span><span class="v">${fmtPct(f.dividend_yield_pct)}</span></div>` : '',
  ].filter(Boolean).join('');
  const scoreBadge = (t.fundamentals_score != null)
    ? `<span class="fund-score" title="Fundamentals bonus applied to dip_score">+${t.fundamentals_score}/10</span>`
    : '';
  const sigBadges = Array.isArray(t.fundamentals_signals) && t.fundamentals_signals.length
    ? `<div class="fund-sigs">${t.fundamentals_signals.map(s => `<span class="fund-sig">${esc(s)}</span>`).join('')}</div>`
    : '';
  if (!rows && !scoreBadge && !sigBadges) return '';
  return `
  <div class="card">
    <h2 class="fund">Fundamentals ${scoreBadge}</h2>
    ${sigBadges}
    ${rows}
  </div>`;
}

function renderAIThesis(t) {
  const newsScore  = t.ai_news_score || 0;
  const themeScore = t.theme_score  || 0;
  const pivotScore = t.ai_pivot_score || 0;
  const total = newsScore + themeScore + pivotScore;
  if (total <= 0) return '';
  const parts = [];
  if (pivotScore) parts.push(`<span class="ai-chip ai-pivot">+${pivotScore} AI PIVOT</span>`);
  if (newsScore)  parts.push(`<span class="ai-chip ai-news">+${newsScore} AI NEWS</span>`);
  if (themeScore) parts.push(`<span class="ai-chip ai-theme">+${themeScore} THEME</span>`);
  const chips = `<div class="ai-chips">${parts.join('')}</div>`;

  const rows = [];
  if (pivotScore && t.ai_pivot_reason) {
    rows.push(`<div class="mrow"><span class="k">AI Pivot</span><span class="v thai" style="max-width:62%; text-align:right;">${esc(t.ai_pivot_reason)}</span></div>`);
  }
  if (Array.isArray(t.theme_hits) && t.theme_hits.length) {
    const tagHtml = t.theme_hits.map(s => `<span class="ai-tag">${esc(s)}</span>`).join('');
    rows.push(`<div class="mrow"><span class="k">Themes</span><span class="v" style="text-align:right;">${tagHtml}</span></div>`);
  }
  if (Array.isArray(t.ai_news_hits) && t.ai_news_hits.length) {
    const items = t.ai_news_hits.slice(0,3).map(h => `<div class="ai-headline thai">• ${esc(h)}</div>`).join('');
    rows.push(`<div class="mrow ai-news-row"><span class="k">AI Headlines</span><div class="v" style="flex:1;">${items}</div></div>`);
  }

  return `
  <div class="card">
    <h2 class="aith">AI Thesis <span class="ai-score">+${total}</span></h2>
    ${chips}
    ${rows.join('')}
  </div>`;
}

function renderSwing(t) {
  if (!t.swing_score || t.swing_score < 40) return '';
  const e = t.swing_entry;
  const sigs = (t.swing_signals || []).map(s => `<span class="sw-sig">${esc(s)}</span>`).join('');
  const explain = {
    'PX>EMA20':   'Price above EMA20 — short trend up',
    'STACK':      'EMA20 > EMA50 — bullish stack',
    'AT EMA20':   'Price at EMA20 (entry pullback zone)',
    'PULLBACK':   'Pulled back 3-10% from recent high',
    'RSI MID':    'RSI 35-50 — uptrend pullback range',
    'HIGHER LOW': '5d low above prior 10d low',
    'LOW ATR':    'ATR < 6% of price — risk manageable',
  };
  const explainRows = (t.swing_signals || []).map(s =>
    `<div class="mrow"><span class="k">${esc(s)}</span><span class="v thai">${esc(explain[s] || '')}</span></div>`
  ).join('');
  const entryHtml = e ? `
    <div class="entry-grid sw-entry-grid">
      <div class="entry-box entry"><div class="l">Entry</div><div class="v">$${fmtNum(e.entry_low,2)}-$${fmtNum(e.entry_high,2)}</div></div>
      <div class="entry-box stop"><div class="l">Stop</div><div class="v">$${fmtNum(e.stop,2)}</div><div class="sub">${e.stop_pct}%</div></div>
      <div class="entry-box t1"><div class="l">Target</div><div class="v">$${fmtNum(e.target,2)}</div><div class="sub">+${e.target_pct}%</div></div>
      <div class="entry-box t2"><div class="l">Hold / R:R</div><div class="v">${e.horizon_days}d</div><div class="sub">${e.rr}:1</div></div>
    </div>` : '';
  return `
  <div class="card">
    <h2 class="sw">Swing Trade <span class="sw-score">${t.swing_score}/100</span></h2>
    <div class="sw-sigs">${sigs}</div>
    ${entryHtml}
    ${explainRows}
  </div>`;
}

function renderReversal(t) {
  if (t.reversal_score == null || t.reversal_score <= 0) return '';
  const signals = Array.isArray(t.reversal_signals) ? t.reversal_signals : [];
  const sigHtml = signals.length
    ? `<div class="rev-sigs">${signals.map(s => `<span class="rev-sig">${esc(s)}</span>`).join('')}</div>`
    : '';
  const explain = {
    'NEW UPTREND': 'EMA20 just crossed EMA50, MACD turned bullish <=10d ago',
    'RSI REBOUND': 'RSI dropped to <=35 within last 10d and now >=40',
    'MACD CROSS':  'MACD bull-crossed within last 5d',
    'ABOVE MA20':  'Price reclaimed EMA20 while still below EMA50',
    'EMA20 UP':    'EMA20 rising by >=0.5% over last 5 days',
    'NEAR LOW':    'Within 15% of 52-week low',
  };
  const rows = signals.map(s =>
    `<div class="mrow"><span class="k">${esc(s)}</span><span class="v thai">${esc(explain[s] || '')}</span></div>`
  ).join('');
  return `
  <div class="card">
    <h2 class="rev">Reversal Signals <span class="rev-score">+${t.reversal_score}/20</span></h2>
    ${sigHtml}
    ${rows}
  </div>`;
}

function renderCatalysts(t) {
  const c = t.catalyst;
  if (!c) return '';
  const rows = [
    c.earnings_date ? `<div class="mrow"><span class="k">Next Earnings</span><span class="v">${esc(c.earnings_date)}${c.earn_in_days!=null?` · ${c.earn_in_days}d`:''}</span></div>` : '',
    c.sentiment ? `<div class="mrow"><span class="k">Sentiment</span><span class="v thai">${esc(c.sentiment)}</span></div>` : '',
    Array.isArray(c.key_catalysts) && c.key_catalysts.length ? `<div class="mrow"><span class="k">Key Catalysts</span><span class="v thai" style="text-align:right; max-width:60%;">${c.key_catalysts.map(esc).join(' · ')}</span></div>` : '',
  ].filter(Boolean).join('');
  if (!rows) return '';
  return `
  <div class="card">
    <h2 class="cat">Catalysts</h2>
    ${rows}
  </div>`;
}

function renderNews(t) {
  const items = Array.isArray(t.news) ? t.news : [];
  if (!items.length) return '';
  const fmtTs = (epoch) => {
    if (!epoch) return '';
    try {
      const d = new Date(epoch * 1000);
      const mo = String(d.getMonth()+1).padStart(2,'0');
      const da = String(d.getDate()).padStart(2,'0');
      const hh = String(d.getHours()).padStart(2,'0');
      const mi = String(d.getMinutes()).padStart(2,'0');
      return `${d.getFullYear()}-${mo}-${da} ${hh}:${mi}`;
    } catch(e) { return ''; }
  };
  const rows = items.slice(0, 5).map((n, idx) => {
    const hlEn = n.headline || '';
    const hlTh = n.headline_th || '';
    const hasTh = !!(hlTh && hlTh !== hlEn);
    const primary = hasTh ? hlTh : hlEn;
    const linkOpen  = n.url ? `<a href="${esc(n.url)}" target="_blank" rel="noopener noreferrer">` : '';
    const linkClose = n.url ? `</a>` : '';
    const langBtn = hasTh
      ? `<span class="lang-toggle" onclick="this.closest('.news-item').classList.toggle('show-en')">EN/TH</span>`
      : '';
    const sumEn = n.summary || '';
    const sumTh = n.summary_th || '';
    const sumHasTh = !!(sumTh && sumTh !== sumEn);
    const sumPrimary = sumHasTh ? sumTh : sumEn;
    return `<div class="news-item" data-idx="${idx}">
      <div class="hl hl-th">${linkOpen}${esc(primary)}${linkClose}${langBtn}</div>
      ${hasTh ? `<div class="hl-en">${linkOpen}${esc(hlEn)}${linkClose}</div>` : ''}
      <div class="meta">
        ${n.source ? `<span class="src">${esc(n.source)}</span>` : ''}
        ${n.datetime ? `<span class="ts">${esc(fmtTs(n.datetime))}</span>` : ''}
      </div>
      ${sumPrimary ? `<div class="sum sum-th">${esc(sumPrimary)}</div>` : ''}
      ${sumHasTh ? `<div class="sum sum-en">${esc(sumEn)}</div>` : ''}
    </div>`;
  }).join('');
  return `
  <div class="card">
    <h2 class="news">News <span class="src-tag">Finnhub · 7d · TH</span></h2>
    <div class="news-list">${rows}</div>
  </div>`;
}

function renderInsider(t) {
  const ins = t.insider;
  if (!ins) return '';
  const fmtShares = (n) => {
    if (n == null) return '—';
    const v = Number(n);
    if (Math.abs(v) >= 1e6) return (v/1e6).toFixed(2) + 'M';
    if (Math.abs(v) >= 1e3) return (v/1e3).toFixed(1) + 'K';
    return String(Math.round(v));
  };
  const top = Array.isArray(ins.top) ? ins.top : [];
  const rows = top.slice(0, 5).map(r => {
    const n = r.share_change || 0;
    const cls = n > 0 ? 'buy' : (n < 0 ? 'sell' : '');
    const sign = n > 0 ? '+' : '';
    return `<div class="ins-row">
      <span class="who">${esc(r.name || '—')}${r.date ? ` · <span class="neu">${esc(r.date)}</span>` : ''}</span>
      <span class="amt ${cls}">${sign}${fmtShares(n)}</span>
    </div>`;
  }).join('');
  const netCls = ins.net_shares > 0 ? 'buy' : (ins.net_shares < 0 ? 'sell' : '');
  return `
  <div class="card">
    <h2 class="ins">Insider Activity <span class="src-tag">${ins.window_days||30}d</span></h2>
    <div class="ins-summary">
      <div class="ins-pill buy"><div class="label">Buys</div><div class="val">${ins.buys||0}</div></div>
      <div class="ins-pill sell"><div class="label">Sells</div><div class="val">${ins.sells||0}</div></div>
      <div class="ins-pill ${netCls}"><div class="label">Net Shares</div><div class="val">${fmtShares(ins.net_shares)}</div></div>
    </div>
    ${rows || '<div class="mrow"><span class="k">No recent transactions</span></div>'}
  </div>`;
}

function renderNarrative(t) {
  const n = t.narrative_th;
  if (!n) return '';
  const why = Array.isArray(n.why_now) && n.why_now.length
    ? `<h3>Why Now</h3><ul class="why">${n.why_now.map(x => `<li>${esc(x)}</li>`).join('')}</ul>` : '';
  const risks = Array.isArray(n.risks) && n.risks.length
    ? `<h3>Risks</h3><ul class="risks">${n.risks.map(x => `<li>${esc(x)}</li>`).join('')}</ul>` : '';
  const thesis = n.thesis_short ? `<div class="thesis">${esc(n.thesis_short)}</div>` : '';
  return `
  <div class="narr">
    <h2>Thai Narrative</h2>
    ${n.headline ? `<div class="head">${esc(n.headline)}</div>` : ''}
    ${n.summary ? `<div class="sum">${esc(n.summary)}</div>` : ''}
    ${why}
    ${risks}
    ${thesis}
  </div>`;
}

// ===================== orchestrator =====================
function render(t, asof, generatedAt) {
  document.getElementById('asof').textContent = asof || '—';
  document.getElementById('pt').textContent = `${t.symbol} · ${t.name || t.symbol} · Buy-the-Dip`;
  if (generatedAt) {
    updateAgo(generatedAt);
    setInterval(() => updateAgo(generatedAt), 30000);
  }

  const sections = [
    renderHero(t),
    renderDipCard(t),
    renderEntryZone(t),
    renderChart(t),
    '<div class="grid2">',
      renderValuation(t),
      renderTechnicals(t),
    '</div>',
    '<div class="grid2">',
      renderFundamentals(t),
      renderCatalysts(t),
    '</div>',
    renderAIThesis(t),
    renderSwing(t),
    renderReversal(t),
    '<div class="grid2">',
      renderNews(t),
      renderInsider(t),
    '</div>',
    renderNarrative(t),
    `<div class="disc">Data as of ${esc(asof||'—')}. Signals computed from price + volume (yfinance). Fundamentals/valuation shown when available. <strong>Not investment advice.</strong></div>`,
  ];
  document.getElementById('content').innerHTML = sections.join('\n');
}

// ===================== fetch =====================
fetch('../dataset.json?_=' + Date.now())
  .then(r => {
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return r.json();
  })
  .then(data => {
    const tickers = data.tickers || [];
    const t = tickers.find(x => x.symbol === SYMBOL);
    if (!t) {
      document.getElementById('content').innerHTML =
        `<div class="state">Ticker <strong>${esc(SYMBOL)}</strong> not in current top-${tickers.length} scanner results. <br><br><a href="../index.html" style="color:var(--blue);">← Back to scanner</a></div>`;
      document.getElementById('pt').textContent = `${SYMBOL} · Not in top scanner`;
      return;
    }
    render(t, data.as_of, data.generated_at);
  })
  .catch(err => {
    console.error('Error loading dataset.json:', err);
    document.getElementById('content').innerHTML =
      `<div class="state">Error loading ticker data: ${esc(err.message||String(err))}</div>`;
  });
</script>
</body>
</html>
